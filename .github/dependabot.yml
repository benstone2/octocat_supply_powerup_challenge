updates:
- directory: /frontend
  groups:
    all-frontend:
      patterns:
      - "*"
  labels:
  - dependencies
  - frontend
  package-ecosystem: npm
  schedule:
    interval: weekly
- directory: /api
  groups:
    backend-dev:
      dependency-type: development
      patterns:
      - "*"
    backend-prod:
      dependency-type: production
      patterns:
      - "*"
  labels:
  - dependencies
  - backend
  package-ecosystem: npm
  schedule:
    interval: weekly
- directory: /
  groups:
    all-actions:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  - actions
  package-ecosystem: github-actions
  schedule:
    interval: weekly
- directory: /frontend
  groups:
    all-frontend:
      patterns:
      - "*"
  labels:
  - dependencies
  - frontend
  - docker
  package-ecosystem: docker
  schedule:
    interval: weekly
- directory: /api
  groups:
    all-docker:
      patterns:
      - "*"
  labels:
  - dependencies
  - backend
  - docker
  - "{{ demo_options.backend }}"
  package-ecosystem: docker
  schedule:
    interval: weekly
version: 2
